<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Пошук</title>
    <style>
        body {
            /* Глибокий темно-синій фон */
            background-color: #0a192f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Стилізація годинника */
        #clock {
            font-size: 5rem;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .search-container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        /* Поле пошуку з блюром (Glassmorphism) */
        .search-box {
            width: 100%;
            padding: 18px 30px;
            font-size: 18px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            transition: all 0.4s ease;
            
            /* Ефект розмиття */
            background: rgba(255, 255, 255, 0.08); /* Напівпрозорий фон */
            backdrop-filter: blur(15px);           /* Саме розмиття фону за полем */
            -webkit-backdrop-filter: blur(15px);    /* Для підтримки в Safari */
            
            color: #ffffff;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .search-box:focus {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        .search-box::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>

    <div class="search-container">
        <form action="https://www.google.com/search" method="GET">
            <input 
                type="text" 
                name="q" 
                class="search-box" 
                placeholder="Пошук у Google..." 
                autocomplete="off"
                autofocus
            >
        </form>
    </div>

    <script>
        // Функція для оновлення часу
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
        }

        // Оновлюємо кожну секунду
        setInterval(updateClock, 1000);
        updateClock(); // Викликаємо одразу при завантаженні
    </script>

</body>
</html>
